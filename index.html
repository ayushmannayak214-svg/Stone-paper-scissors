<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone-Paper-Scissor</title>
    <link rel="icon" type="png" href="title.png">
    <link rel="stylesheet" href="stone.css">
</head>
<body>
    <main>
        <h1>Stone Paper Scissors</h1>
        <p>Welcome to the game!</p>
        <div class="game">
            <div class="container">
                <button class="moves" id="stone">Stone</button>
                <button class="moves" id="paper">Paper</button>
                <button class="moves" id="scissor">Scissor</button>
            </div>
            <div class="point">
                <p id="user">User: 0</p>
                <p id="computer">Computer: 0</p>
            </div>
            <div class="msg">
                <p></p>
            </div>
        </div>
        <button id="new">NEW GAME</button>
    </main>
    <script src="stone.js"></script>
</body>
</html>
